[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mixxx-multitool"
version = "0.1.0"
description = "Safe CLI foundation for Mixxx database scanning, auditing, cleanup, organization, and scoring"
readme = "README.md"
requires-python = ">=3.9"

[project.scripts]
mixxx-tool = "mixxx_tool.cli:main"

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["mixxx_tool*"]
